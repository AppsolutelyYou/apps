<body>
<div class="wrap">
  <header class="app-header"><h1>Date Night Idea Generator</h1>
  <p class="sub">Stuck on what to do? Set the vibe and let it pick a date night for you.</p></header>

  <div class="panel">
    <label for="setting">Setting</label>
    <select id="setting"><option value="any">Surprise me</option><option value="in">At home</option><option value="out">Out and about</option></select>
    <label for="budget">Budget</label>
    <select id="budget"><option value="any">Any budget</option><option value="free">Free</option><option value="low">Low cost</option><option value="treat">A treat</option></select>
    <label for="energy">Energy</label>
    <select id="energy"><option value="any">Any energy</option><option value="cozy">Low-key &amp; cozy</option><option value="active">Active &amp; fun</option></select>
    <button class="btn" onclick="gen()">Generate Date Idea</button>
  </div>

  <div class="idea" id="idea"></div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const IDEAS=[
    {t:"Cook a new recipe together from a country you have never visited",s:"in",b:"low",e:"cozy"},
    {t:"Build a blanket fort and watch a film from your teenage years",s:"in",b:"free",e:"cozy"},
    {t:"At-home spa night — face masks, music, no phones",s:"in",b:"low",e:"cozy"},
    {t:"Cook-off challenge: same ingredients, two dishes, taste test",s:"in",b:"low",e:"active"},
    {t:"Living room dance party with your first-dance songs",s:"in",b:"free",e:"active"},
    {t:"Do a puzzle or board game with a small prize on the line",s:"in",b:"free",e:"cozy"},
    {t:"Sunset or sunrise picnic somewhere with a view",s:"out",b:"low",e:"cozy"},
    {t:"Wander a part of town you have never explored on foot",s:"out",b:"free",e:"active"},
    {t:"Visit a museum or gallery and rate every piece out of ten",s:"out",b:"low",e:"cozy"},
    {t:"Try a class together — pottery, dancing, cooking",s:"out",b:"treat",e:"active"},
    {t:"Farmers market trip, then cook what you found",s:"out",b:"low",e:"active"},
    {t:"Mini golf, bowling, or an arcade — keep score",s:"out",b:"low",e:"active"},
    {t:"Coffee shop hop — one drink each, three different places",s:"out",b:"low",e:"cozy"},
    {t:"Stargazing with a flask of something warm",s:"out",b:"free",e:"cozy"},
    {t:"Recreate your first date as closely as you can",s:"out",b:"treat",e:"cozy"},
    {t:"A long walk with a deep-questions list — no small talk allowed",s:"out",b:"free",e:"active"},
    {t:"Write each other a letter, then read them aloud over dinner",s:"in",b:"free",e:"cozy"},
    {t:"Plan your dream trip together, even if it is years away",s:"in",b:"free",e:"cozy"},
    {t:"Themed dinner night — pick a country, dress, cook, decorate",s:"in",b:"low",e:"active"},
    {t:"Book a fancy meal you have been meaning to try",s:"out",b:"treat",e:"cozy"}
  ];
  function gen(){
    const S=g('setting').value,B=g('budget').value,E=g('energy').value;
    let pool=IDEAS.filter(x=>(S==='any'||x.s===S)&&(B==='any'||x.b===B)&&(E==='any'||x.e===E));
    if(!pool.length)pool=IDEAS.filter(x=>(S==='any'||x.s===S));
    if(!pool.length)pool=IDEAS;
    const pick=pool[Math.floor(Math.random()*pool.length)];
    const map={in:'At home',out:'Out',free:'Free',low:'Low cost',treat:'A treat',cozy:'Cozy',active:'Active'};
    const metaBadges=[
      {bg:'#F4C542',color:'#1A1A1A',val:map[pick.s]},
      {bg:'#FF69B4',color:'#fff',val:map[pick.b]},
      {bg:'#A6D76A',color:'#1A1A1A',val:map[pick.e]}
    ];
    const ideaEl=g('idea');
    ideaEl.style.display='block';
    ideaEl.style.padding='0';
    ideaEl.style.overflow='hidden';
    ideaEl.style.borderRadius='14px';
    ideaEl.style.border='3px solid #A6D76A';
    ideaEl.style.boxShadow='0 5px 0 rgba(0,0,0,0.1)';
    ideaEl.innerHTML=`
      <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:14px 20px;">
        <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.6rem;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">Tonight's Idea</div>
        <div style="color:rgba(255,255,255,0.88);font-size:0.9rem;margin-top:2px;">Matched to your filters — hit Generate again if you want another</div>
      </div>
      <div style="padding:20px 24px;background:#FFF2E1;">
        <div style="font-size:1.15rem;font-weight:600;color:#1A1A1A;line-height:1.6;margin-bottom:14px;">${pick.t}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
          ${metaBadges.map(b=>`<span style="display:inline-block;background:${b.bg};color:${b.color};font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;">${b.val}</span>`).join('')}
        </div>
        <button class="try-again-btn" onclick="gen()">↻ Try Another</button>
      </div>`;
  }
</script>
</body>
