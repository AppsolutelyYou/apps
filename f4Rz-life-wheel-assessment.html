<body>
<div class="wrap">
  <header class="app-header"><h1>Life Wheel Assessment</h1>
  <p class="sub">Score 8 areas of your life 1-10. See which area is dragging the whole wheel.</p></header>

  <div class="panel" id="wheel"></div>
  <div class="stats">
    <div class="stat" id="sAvg"></div>
    <div class="stat" id="sHigh"></div>
    <div class="stat" id="sLow"></div>
  </div>
  <div class="focus" id="focus"></div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const AREAS=["Health","Career / work","Money","Relationships","Family","Fun & play","Personal growth","Environment / home"];
  const g=id=>document.getElementById(id);
  let V=JSON.parse(localStorage.getItem('lwa')||'null')||AREAS.map(()=>5);
  g('wheel').innerHTML=AREAS.map((a,i)=>`<div class="row"><div class="lbl">${a}</div><input type="range" min="1" max="10" value="${V[i]}" data-i="${i}"><div class="val" id="v${i}">${V[i]}</div></div>`).join('');
  g('wheel').querySelectorAll('input').forEach(r=>r.oninput=()=>{ const i=+r.dataset.i; V[i]=+r.value; g('v'+i).textContent=V[i]; localStorage.setItem('lwa',JSON.stringify(V)); calc(); });
  function calc(){
    const avg=V.reduce((a,b)=>a+b,0)/V.length;
    const hi=V.indexOf(Math.max(...V)), lo=V.indexOf(Math.min(...V));
    g('sAvg').innerHTML=`<div style="font-family:'Fredoka One',cursive;font-size:2rem;color:#F4C542;">${avg.toFixed(1)}</div><div style="font-size:0.8rem;color:#7A7A6A;font-weight:600;text-transform:uppercase;letter-spacing:1px;">Overall</div>`;
    g('sHigh').innerHTML=`<div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:#A6D76A;">${AREAS[hi]}</div><div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:#1A1A1A;">${V[hi]}/10</div><div style="font-size:0.8rem;color:#7A7A6A;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Strongest</div>`;
    g('sLow').innerHTML=`<div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:#FF69B4;">${AREAS[lo]}</div><div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:#1A1A1A;">${V[lo]}/10</div><div style="font-size:0.8rem;color:#7A7A6A;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">Needs Attention</div>`;
    g('focus').innerHTML=`
      <div style="padding:0;overflow:hidden;border-radius:14px;border:3px solid #A6D76A;box-shadow:0 4px 0 rgba(0,0,0,0.08);margin-top:16px;">
        <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:12px 20px;">
          <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.4rem;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">Your Focus Area</div>
        </div>
        <div style="padding:14px 20px;background:#FFF2E1;">
          <span style="display:inline-block;background:#FF69B4;color:#fff;font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px;">${AREAS[lo]} · ${V[lo]}/10</span>
          <div style="font-size:0.95rem;color:#2A2A1A;line-height:1.6;">A wheel only rolls as smoothly as its lowest score — this is your highest-leverage place to invest this quarter. One small habit in <strong>${AREAS[lo]}</strong> will lift the whole experience.</div>
        </div>
      </div>`;
  }
  calc();
</script>
