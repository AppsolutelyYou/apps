<body>
<div class="wrap">
  <header class="app-header"><h1>Grocery List Generator</h1>
  <p class="sub">Build a shopping list sorted by aisle — so you shop fast and forget nothing.</p></header>

  <div class="panel">
    <div style="margin-bottom:10px;">
      <label style="font-size:0.9rem;font-weight:700;color:#1A1A1A;margin-bottom:6px;display:block;">Item</label>
      <input id="item" placeholder="e.g. Tomatoes, Olive oil, Chicken thighs…" onkeydown="if(event.key==='Enter')add()" style="width:100%;padding:10px 14px;font-size:0.95rem;">
    </div>
    <div style="display:flex;gap:10px;align-items:flex-end;">
      <div style="flex:1;">
        <label style="font-size:0.9rem;font-weight:700;color:#1A1A1A;margin-bottom:6px;display:block;">Aisle</label>
        <select id="aisle" style="width:100%;padding:10px 12px;font-size:0.93rem;">
          <option>Produce</option>
          <option>Meat &amp; fish</option>
          <option>Dairy &amp; eggs</option>
          <option>Bakery</option>
          <option>Pantry &amp; dry goods</option>
          <option>Frozen</option>
          <option>Drinks</option>
          <option>Household</option>
          <option>Other</option>
        </select>
      </div>
      <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:11px 22px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);white-space:nowrap;" onclick="add()">+ Add</button>
    </div>
  </div>

  <div style="padding:0;overflow:hidden;border-radius:14px;border:3px solid #A6D76A;box-shadow:0 5px 0 rgba(0,0,0,0.1);margin-bottom:14px;">
    <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:14px 20px;">
      <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.6rem;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">Your List</div>
      <div style="color:rgba(255,255,255,0.88);font-size:0.9rem;margin-top:2px;">Sorted by aisle — add items above and check them off as you shop</div>
    </div>
    <div style="padding:16px 20px 20px;background:#FFF2E1;">
      <div id="list"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:2px dashed rgba(0,0,0,0.07);">
        <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 20px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);" onclick="copyList()">Copy List</button>
        <button style="background:transparent;color:#1A1A1A;border:2px solid #A6D76A;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 20px;cursor:pointer;" onclick="clearDone()">Clear Ticked</button>
        <button style="background:transparent;color:#1A1A1A;border:2px solid #A6D76A;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 20px;cursor:pointer;" onclick="clearAll()">Clear All</button>
      </div>
    </div>
  </div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const AISLES=["Produce","Meat & fish","Dairy & eggs","Bakery","Pantry & dry goods","Frozen","Drinks","Household","Other"];
  let R=JSON.parse(localStorage.getItem('glg2')||'[]');
  const save=()=>localStorage.setItem('glg2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('item')){ alert('Enter an item.'); return; }
    R.push({i:v('item'),a:g('aisle').value,done:false}); g('item').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearDone(){ R=R.filter(x=>!x.done); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole list?')){ R=[]; save(); render(); } }
  function copyList(){ if(!R.length){ alert('List is empty.'); return; }
    let t='GROCERY LIST\n';
    AISLES.forEach(a=>{ const items=R.filter(x=>x.a===a); if(items.length)t+='\n'+a.toUpperCase()+'\n'+items.map(x=>'  - '+x.i).join('\n')+'\n'; });
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  const AISLE_COLORS=['#F27C38','#F4C542','#FF69B4','#A6D76A','#2E7D73','#F27C38','#F4C542','#FF69B4','#A6D76A'];
  const AISLE_TEXT=['#fff','#1A1A1A','#fff','#1A1A1A','#fff','#fff','#1A1A1A','#fff','#1A1A1A'];
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div style="text-align:center;padding:20px 0;color:#7A7A6A;font-size:0.95rem;">Your list is empty — add an item above.</div>'; return; }
    const aisleHtml=AISLES.map((a,ai)=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.a===a);
      if(!items.length)return '';
      const bg=AISLE_COLORS[ai%AISLE_COLORS.length];
      const tc=AISLE_TEXT[ai%AISLE_TEXT.length];
      return `
        <div style="margin-bottom:12px;border-radius:12px;overflow:hidden;border:2px solid #A6D76A;">
          <div style="background:${bg};padding:8px 16px;">
            <span style="font-family:'Fredoka One',cursive;color:${tc};font-size:1rem;letter-spacing:0.5px;">${a}</span>
          </div>
          <div style="background:#FFF2E1;">
            ${items.map(({x,i},ri)=>{
              const rowBg=ri%2===0?'#ffffff':'#fffaf3';
              return `<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:${rowBg};border-bottom:1px solid rgba(166,215,106,0.3);${x.done?'opacity:0.5;':''}" class="${x.done?'done':''}">
                <span style="width:22px;height:22px;border-radius:6px;border:2px solid ${bg};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.85rem;color:${bg};flex-shrink:0;font-weight:700;" onclick="toggle(${i})">${x.done?'✓':''}</span>
                <span style="flex:1;color:#2A2A1A;font-size:0.93rem;${x.done?'text-decoration:line-through;':''}">${esc(x.i)}</span>
                <button style="background:none;border:none;color:#7A7A6A;cursor:pointer;font-size:0.85rem;padding:4px 6px;border-radius:6px;" onclick="del(${i})">✕</button>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }).join('');
    L.innerHTML=aisleHtml||'<div class="empty">Your list is empty.</div>';
  }
  render();
</script>
</body>
