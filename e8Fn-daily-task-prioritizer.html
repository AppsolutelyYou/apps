<body>

<header class="app-header"><h1>Daily Task Prioritizer</h1>
<p class="subtitle">Add your tasks, set a priority, and tackle what matters most first.</p></header>

<div class="card">
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Enter a task..." maxlength="120" />
    <select id="prioritySelect">
      <option value="high">🔴 High</option>
      <option value="medium" selected>🟡 Medium</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="btn" onclick="addTask()">Add</button>
  </div>
</div>

<div class="card" style="padding:0;overflow:hidden;">
  <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:14px 20px;">
    <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.6rem;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">Today's Tasks</div>
    <div style="color:rgba(255,255,255,0.88);font-size:0.9rem;margin-top:2px;">Sorted by priority — tackle the top ones first</div>
  </div>
  <div style="padding:8px 20px 16px;">
    <div id="taskList"><p class="empty">No tasks yet — add one above.</p></div>
    <div class="clear-row" style="margin-top:12px;">
      <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:9px 20px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);" onclick="clearDone()">Clear Completed</button>
    </div>
  </div>
</div>

<footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>

<script>
  const ORDER = { high: 0, medium: 1, low: 2 };
  let tasks = JSON.parse(localStorage.getItem('dtp_tasks') || '[]');

  function save() {
    localStorage.setItem('dtp_tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    const priority = document.getElementById('prioritySelect').value;
    tasks.push({ id: Date.now(), text, priority, done: false });
    tasks.sort((a, b) => ORDER[a.priority] - ORDER[b.priority]);
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const BADGE = {
    high:   { bg: '#F27C38', color: '#fff' },
    medium: { bg: '#F4C542', color: '#1A1A1A' },
    low:    { bg: '#A6D76A', color: '#1A1A1A' }
  };

  function render() {
    const list = document.getElementById('taskList');
    if (!tasks.length) {
      list.innerHTML = '<p class="empty">No tasks yet — add one above.</p>';
      return;
    }
    list.innerHTML = tasks.map((t, i) => {
      const b = BADGE[t.priority];
      const rowBg = i % 2 === 0 ? '#ffffff' : '#fffaf3';
      return `
      <div class="task-item" style="background:${rowBg};border-radius:8px;padding:10px 12px;border-bottom:2px dashed rgba(0,0,0,0.07);">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
        <span class="task-text" style="${t.done ? 'text-decoration:line-through;color:#aaa;' : ''};flex:1;word-break:break-word;">${esc(t.text)}</span>
        <span style="display:inline-block;background:${b.bg};color:${b.color};font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;">${t.priority.charAt(0).toUpperCase() + t.priority.slice(1)}</span>
        <button style="background:none;border:none;color:#7A7A6A;cursor:pointer;font-size:0.85rem;padding:4px 6px;border-radius:6px;box-shadow:none;" onclick="remove(${t.id})" title="Delete">✕</button>
      </div>`;
    }).join('');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
