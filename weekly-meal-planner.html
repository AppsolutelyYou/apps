<body>
<div class="wrap">
  <header class="app-header"><h1>Weekly Meal Planner</h1>
  <p class="sub">Plan breakfast, lunch and dinner for the week — saved automatically as you type.</p></header>

  <div class="panel" id="grid"></div>
  <div class="panel" style="text-align:center;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
    <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:11px 26px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);" onclick="copyAll()">Copy Week</button>
    <button style="background:transparent;color:#1A1A1A;border:2px solid #A6D76A;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:11px 26px;cursor:pointer;" onclick="clearAll()">Clear All</button>
  </div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const MEALS=["Breakfast","Lunch","Dinner"];
  let D=JSON.parse(localStorage.getItem('wmp')||'{}');
  const save=()=>localStorage.setItem('wmp',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const DAY_COLORS=['#F27C38','#F4C542','#FF69B4','#A6D76A','#2E7D73','#F27C38','#F4C542'];
  const DAY_TEXT=['#fff','#1A1A1A','#fff','#1A1A1A','#fff','#fff','#1A1A1A'];
  function build(){
    g('grid').innerHTML=DAYS.map((d,di)=>'<div class="day" style="margin-bottom:14px;border-radius:12px;overflow:hidden;border:2px solid #A6D76A;">'+
      `<div style="background:${DAY_COLORS[di]};padding:9px 16px;"><span style="font-family:'Fredoka One',cursive;color:${DAY_TEXT[di]};font-size:1.1rem;">${d}</span></div>`+
      '<div style="background:#FFF2E1;padding:12px 16px;">'+
      MEALS.map((m,mi)=>{ const k=d+'|'+m;
        const rowBg=mi%2===0?'#ffffff':'#fffaf3';
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;background:${rowBg};border-radius:8px;padding:6px 10px;">
          <label style="width:75px;flex:none;font-size:0.8rem;font-weight:700;color:#7A7A6A;text-transform:uppercase;letter-spacing:0.5px;">${m}</label>
          <input id="${k.replace(/\|/g,'_')}" value="${esc(D[k]||'')}" oninput="upd('${k}',this.value)" placeholder="What's for ${m.toLowerCase()}?" style="flex:1;padding:7px 10px;background:#fff;border:2px solid #A6D76A;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;">
        </div>`;
      }).join('')+
      '</div></div>').join('');
  }
  function upd(k,v){ D[k]=v; save(); }
  function copyAll(){
    let t='WEEKLY MEAL PLAN\n';
    DAYS.forEach(d=>{ t+='\n'+d.toUpperCase()+'\n'+MEALS.map(m=>'  '+m+': '+(D[d+'|'+m]||'-')).join('\n')+'\n'; });
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function clearAll(){ if(confirm('Clear the whole week?')){ D={}; save(); build(); } }
  requestAnimationFrame(build);
</script>
