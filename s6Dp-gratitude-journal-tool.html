<body>
<div class="wrap">
  <header class="app-header"><h1>Gratitude Journal Tool</h1>
  <p class="sub">Three specific things, daily. Specific beats generic — that is what changes the brain.</p></header>

  <div class="panel">
    <label for="g1">1 — something small from today</label>
    <input id="g1" placeholder="The smaller and more specific, the better">
    <label for="g2">2 — a person you appreciate (and why)</label>
    <input id="g2" placeholder="Naming why activates the effect">
    <label for="g3">3 — something about you</label>
    <input id="g3" placeholder="A trait, an effort, a small win">
    <button class="btn" onclick="save()" style="margin-top:20px;width:100%;">+ Save Today</button>
  </div>

  <div id="stat" style="text-align:center;padding:10px 0 6px;"></div>
  <div id="list"></div>
  <div style="text-align:right;margin-top:8px;">
    <button class="btn-secondary" onclick="clearAll()">Clear All</button>
  </div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let E=JSON.parse(localStorage.getItem('gj')||'[]');
  const saveLs=()=>localStorage.setItem('gj',JSON.stringify(E));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function fmtDate(iso){ const [y,m,d]=iso.split('-'); return `${m}/${d}/${y}`; }
  function save(){ const a=v('g1'), b=v('g2'), c=v('g3'); if(!a&&!b&&!c){alert('Add at least one.');return;}
    const d=new Date().toISOString().slice(0,10);
    const ex=E.find(x=>x.d===d); if(ex){ex.i=[a,b,c].filter(Boolean);} else E.push({d,i:[a,b,c].filter(Boolean)});
    ['g1','g2','g3'].forEach(k=>g(k).value=''); saveLs(); render(); }
  function del(i){ E.splice(i,1); saveLs(); render(); }
  function clearAll(){ if(confirm('Clear journal?')){ E=[]; saveLs(); render(); } }
  function streak(){ const days=[...new Set(E.map(x=>x.d))].sort().reverse(); let s=0, d=new Date(); for(let i=0;i<days.length;i++){ const dd=d.toISOString().slice(0,10); if(days[i]===dd){s++; d.setDate(d.getDate()-1);} else if(i===0 && days[i]===new Date(d.getTime()-864e5).toISOString().slice(0,10)){d.setDate(d.getDate()-1); s++;} else break;} return s; }
  const ENTRY_EMOJIS=['🌟','💛','🌿','✨','🎉','🌸'];
  function render(){
    g('stat').innerHTML = E.length?`<span style='display:inline-block;background:#A6D76A;color:#1A1A1A;font-size:0.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-right:6px;'>${E.length} ENTR${E.length===1?'Y':'IES'}</span><span style='display:inline-block;background:#F27C38;color:#fff;font-size:0.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;'>🔥 ${streak()} DAY STREAK</span>`:'';
    const L=g('list');
    if(!E.length){ L.innerHTML='<div style="background:#FFF2E1;border:3px solid #A6D76A;border-radius:14px;padding:28px 24px;text-align:center;margin-top:8px;"><div style="font-family:\'Fredoka One\',cursive;font-size:1.4rem;color:#F27C38;margin-bottom:8px;">Your journal is empty ✨</div><div style="color:#7A7A6A;font-size:0.95rem;">Three specific things will do it. The smaller the detail, the stronger the effect.</div></div>'; return; }
    L.innerHTML=[...E].sort((a,b)=>a.d<b.d?1:-1).map((x,i)=>`
      <div style="padding:0;overflow:hidden;border-radius:14px;border:3px solid #A6D76A;box-shadow:0 4px 0 rgba(0,0,0,0.08);margin-bottom:12px;">
        <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.1rem;">${ENTRY_EMOJIS[i%ENTRY_EMOJIS.length]} ${fmtDate(x.d)}</span>
          <span style="cursor:pointer;color:rgba(255,255,255,0.7);font-size:1.1rem;padding:2px 6px;" onclick="del(${E.indexOf(x)})" title="Delete">✕</span>
        </div>
        <div style="padding:12px 18px 16px;background:#FFF2E1;">
          ${x.i.map((t,j)=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:6px 0;${j<x.i.length-1?'border-bottom:1px dashed rgba(0,0,0,0.07)':''}">
            <span style="display:inline-block;background:${['#F4C542','#FF69B4','#A6D76A'][j%3]};color:${['#1A1A1A','#fff','#1A1A1A'][j%3]};font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;margin-top:2px;">${j===0?'Small':j===1?'Person':'You'}</span>
            <span style="font-size:0.93rem;color:#2A2A1A;line-height:1.5;">${esc(t)}</span>
          </div>`).join('')}
        </div>
      </div>`).join('');
  }
  render();
</script>
</body>
