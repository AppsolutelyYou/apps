<body>
<div class="wrap">
  <header class="branded">
    <h1>Caption Formula Tool</h1>
    <p class="sub">Plug in your topic, pick a proven copywriting formula, and get a finished caption that actually converts.</p>
  </header>

  <div class="card" id="inputCard">
    <label for="topic">What's your post about?</label>
    <input id="topic" type="text" placeholder="e.g. why morning routines matter, getting toddlers to eat vegetables, starting a side hustle" />

    <label for="audience">Who you're talking to</label>
    <input id="audience" type="text" placeholder="e.g. new teachers, home cooks, first-year freelancers, new parents" />

    <label for="benefit">The outcome or transformation (complete the phrase "I can now ___")</label>
    <textarea id="benefit" placeholder="e.g. feel calm at bedtime, charge what I'm worth, finish a painting I'm proud of, run without stopping"></textarea>

    <label for="cta">Call to action</label>
    <input id="cta" type="text" placeholder="e.g. Comment PRICE for the link, Save this for later" />

    <label for="formula">Pick a formula</label>
    <select id="formula">
      <option value="AIDA">AIDA — Attention, Interest, Desire, Action</option>
      <option value="PAS">PAS — Problem, Agitate, Solution</option>
      <option value="BAB">BAB — Before, After, Bridge</option>
      <option value="HOOK">Hook + Story + Lesson</option>
      <option value="LIST">Listicle (3-point teaching)</option>
    </select>

    <button onclick="generate()">Build My Caption</button>
  </div>

  <div id="output" class="hidden"></div>

  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Appsolutely You - A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  // Section label colors cycling through brand palette
  const LABEL_COLORS = [
    { bg: '#F27C38', text: '#fff' },
    { bg: '#F4C542', text: '#1A1A1A' },
    { bg: '#FF69B4', text: '#fff' },
    { bg: '#A6D76A', text: '#1A1A1A' },
    { bg: '#2E7D73', text: '#fff' }
  ];

  const FORMULAS = {
    AIDA: {
      name: "AIDA",
      desc: "Attention → Interest → Desire → Action. A classic for sales-driving posts.",
      sections: ['Attention', 'Interest', 'Desire', 'Action'],
      build: (t, a, b, c) => [
        `${a} — this one's for you. 👀`,
        `Most people assume ${t} has to be complicated. That's what keeps so many ${a} spinning their wheels instead of making real progress.`,
        `What if it didn't have to be that way? Imagine this: ${b}. That kind of shift is real — and closer than you think.`,
        c
      ]
    },
    PAS: {
      name: "PAS",
      desc: "Problem → Agitate → Solution. Powerful when your audience feels real pain.",
      sections: ['Problem', 'Agitate', 'Solution', 'Action'],
      build: (t, a, b, c) => [
        `If you're a ${a} who's struggling with ${t} — you're not alone, and you're not the problem.`,
        `But here's the part nobody says out loud: waiting for it to get easier on its own doesn't work. The longer it goes unaddressed, the heavier it gets. And you deserve better than that.`,
        `There's a different way forward. One where ${b} is the outcome, not the distant dream — and you don't have to figure it all out from scratch to get there.`,
        c
      ]
    },
    BAB: {
      name: "BAB",
      desc: "Before → After → Bridge. Transformation stories sell hard.",
      sections: ['Before', 'After', 'Bridge', 'Action'],
      build: (t, a, b, c) => [
        `Before: I was a ${a} who kept bumping into the same wall with ${t}. I'd try something, it wouldn't stick, and I'd be back at square one.`,
        `After: things look different now. ${b} — that became possible. And that shift didn't come from trying harder. It came from trying differently.`,
        `The bridge between those two places? Simpler than I expected. Want to know what it was?`,
        c
      ]
    },
    HOOK: {
      name: "Hook + Story + Lesson",
      desc: "Open with a hook, tell a quick story, end with a teachable takeaway.",
      sections: ['Hook', 'Story', 'Lesson', 'Action'],
      build: (t, a, b, c) => [
        `There was a point where I almost walked away from ${t} entirely.`,
        `I was doing everything a ${a} is supposed to do — and still felt like I was missing something. Then one small thing changed. The result: ${b}. The relief was real.`,
        `What I learned: it's rarely about doing more. It's about finding the thing that actually fits where you are right now. That's gold.`,
        c
      ]
    },
    LIST: {
      name: "3-Point Listicle",
      desc: "Save-worthy structure. Promises value upfront, delivers in 3 punches.",
      sections: ['Hook', 'Point 1', 'Point 2', 'Point 3', 'Save prompt', 'Action'],
      build: (t, a, b, c) => [
        `3 things every ${a} should know about ${t}:`,
        `1. The barrier is rarely what it looks like. Most people focus on the wrong thing — and then wonder why nothing changes.`,
        `2. Small and consistent beats big and occasional. Every time. The people seeing results aren't doing more than you. They're doing it differently — and that's what makes ${b} possible.`,
        `3. You don't need to have it all figured out to start. Progress happens in the middle of the mess, not after it clears.`,
        `Save this for the next time you need a reset.`,
        c
      ]
    }
  };

  function generate() {
    const t = document.getElementById('topic').value.trim();
    const a = document.getElementById('audience').value.trim();
    const b = document.getElementById('benefit').value.trim();
    const c = document.getElementById('cta').value.trim();
    const key = document.getElementById('formula').value;

    if (!t || !a || !b || !c) {
      alert('Please fill in all four fields first.');
      return;
    }

    const f = FORMULAS[key];
    const paragraphs = f.build(t, a, b, c);

    const sectionsHTML = paragraphs.map((para, i) => {
      const lc = LABEL_COLORS[i % LABEL_COLORS.length];
      const label = f.sections[i] || '';
      return `<div style="display:grid;grid-template-columns:90px 1fr;gap:12px;align-items:start;padding:14px 0;border-bottom:2px dashed rgba(0,0,0,0.07);">
        <div style="display:inline-block;background:${lc.bg};color:${lc.text};font-size:0.68rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;text-align:center;line-height:1.3;margin-top:2px;">${label}</div>
        <div style="font-size:0.96rem;color:#2A2A1A;line-height:1.65;">${para.replace(/</g, '&lt;')}</div>
      </div>`;
    }).join('');

    // Full caption as plain text for clipboard
    const fullCaption = paragraphs.join('\n\n');

    const out = document.getElementById('output');
    out.innerHTML = `<div class="card" style="padding:0;overflow:hidden;">
      <div style="background:var(--header);padding:18px 24px 16px;border-radius:11px 11px 0 0;">
        <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.6rem;letter-spacing:0.5px;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">${f.name}</div>
        <div style="color:rgba(255,255,255,0.88);font-size:0.9rem;margin-top:4px;">${f.desc}</div>
      </div>
      <div style="padding:4px 24px 20px;">
        ${sectionsHTML}
        <div class="actions" style="margin-top:16px;">
          <button onclick="copyCaption()" style="background:var(--pink);color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 24px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);transition:background 0.18s,transform 0.15s;flex:1;">Copy Caption</button>
          <button onclick="reset()" style="background:transparent;color:var(--dark);border:2px solid var(--dark);border-radius:10px;font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 24px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,0.1);transition:background 0.18s,transform 0.15s;flex:1;">Try Another</button>
        </div>
      </div>
    </div>`;
    // Store full caption for clipboard
    window._captionText = fullCaption;
    out.classList.remove('hidden');
    document.getElementById('inputCard').classList.add('hidden');
    out.scrollIntoView({ behavior: 'smooth' });
  }

  function copyCaption() {
    navigator.clipboard.writeText(window._captionText || '').then(() => alert('Caption copied to clipboard.'));
  }

  function reset() {
    document.getElementById('output').classList.add('hidden');
    document.getElementById('inputCard').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
