<body>
<div class="wrap">
  <header class="app-header"><h1>Kids Activity Planner</h1>
  <p class="sub">Beat the “I'm bored” moment. Set the filters and get an activity to do now.</p></header>

  <div class="panel">
    <label for="age">Age range</label>
    <select id="age"><option value="t">Toddler (1-3)</option><option value="p">Preschool (3-5)</option><option value="s">School age (6-9)</option><option value="b">Older (10+)</option></select>
    <label for="place">Where</label>
    <select id="place"><option value="any">Anywhere</option><option value="in">Indoors</option><option value="out">Outdoors</option></select>
    <label for="energy">Energy level</label>
    <select id="energy"><option value="any">Any</option><option value="calm">Calm / quiet</option><option value="active">Active / busy</option></select>
    <button class="btn" onclick="gen()">Get an Activity</button>
  </div>

  <div class="idea" id="idea"></div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const A=[
    {t:"Sensory bin — rice or water with cups and scoops",ages:["t","p"],p:"in",e:"calm"},
    {t:"Build the tallest tower you can with blocks or cups",ages:["t","p","s"],p:"in",e:"active"},
    {t:"Indoor obstacle course with cushions and chairs",ages:["p","s","b"],p:"in",e:"active"},
    {t:"Dance freeze game — music stops, everyone freezes",ages:["t","p","s"],p:"in",e:"active"},
    {t:"Read a story together and act out the characters",ages:["t","p","s"],p:"in",e:"calm"},
    {t:"Draw a comic strip of your day",ages:["s","b"],p:"in",e:"calm"},
    {t:"Bake or decorate something simple together",ages:["p","s","b"],p:"in",e:"calm"},
    {t:"Science experiment — baking soda and vinegar volcano",ages:["s","b"],p:"in",e:"active"},
    {t:"Nature scavenger hunt — leaves, stones, feathers",ages:["p","s","b"],p:"out",e:"active"},
    {t:"Chalk drawing or hopscotch on the pavement",ages:["p","s"],p:"out",e:"active"},
    {t:"Bug hunt with a magnifying glass",ages:["p","s"],p:"out",e:"calm"},
    {t:"Playground trip — race to every piece of equipment",ages:["t","p","s"],p:"out",e:"active"},
    {t:"Cloud watching — name what you see",ages:["p","s","b"],p:"out",e:"calm"},
    {t:"Plant a seed and start a little garden patch",ages:["p","s","b"],p:"out",e:"calm"},
    {t:"Bike, scooter or skate session",ages:["s","b"],p:"out",e:"active"},
    {t:"Build a fort, indoors or out",ages:["p","s","b"],p:"any",e:"active"},
    {t:"Puppet show — make puppets, then perform",ages:["p","s"],p:"any",e:"calm"},
    {t:"Treasure hunt with drawn clues",ages:["s","b"],p:"any",e:"active"},
    {t:"Quiet craft — collage from old magazines",ages:["p","s","b"],p:"in",e:"calm"},
    {t:"Board game or card game tournament",ages:["s","b"],p:"in",e:"calm"}
  ];
  function gen(){
    const ag=g('age').value,P=g('place').value,E=g('energy').value;
    let pool=A.filter(x=>x.ages.includes(ag)&&(P==='any'||x.p===P||x.p==='any')&&(E==='any'||x.e===E));
    if(!pool.length)pool=A.filter(x=>x.ages.includes(ag));
    if(!pool.length)pool=A;
    const pick=pool[Math.floor(Math.random()*pool.length)];
    const map={t:'Toddler',p:'Preschool',s:'School age',b:'Older',in:'Indoors',out:'Outdoors',any:'Anywhere',calm:'Calm',active:'Active'};
    const badges=[
      {bg:'#F4C542',color:'#1A1A1A',val:map[ag]},
      {bg:'#FF69B4',color:'#fff',val:map[pick.p]},
      {bg:'#A6D76A',color:'#1A1A1A',val:map[pick.e]}
    ];
    const ideaEl=g('idea');
    ideaEl.style.display='block';
    ideaEl.style.padding='0';
    ideaEl.style.overflow='hidden';
    ideaEl.style.borderRadius='14px';
    ideaEl.style.border='3px solid #A6D76A';
    ideaEl.style.boxShadow='0 5px 0 rgba(0,0,0,0.1)';
    ideaEl.innerHTML=`
      <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:14px 20px;">
        <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.6rem;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">Activity Idea</div>
        <div style="color:rgba(255,255,255,0.88);font-size:0.9rem;margin-top:2px;">Matched to your filters — hit the button again for another</div>
      </div>
      <div style="padding:20px 24px;background:#FFF2E1;">
        <div style="font-size:1.15rem;font-weight:600;color:#1A1A1A;line-height:1.6;margin-bottom:14px;">${pick.t}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
          ${badges.map(b=>`<span style="display:inline-block;background:${b.bg};color:${b.color};font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;">${b.val}</span>`).join('')}
        </div>
        <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 22px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);"
          onmouseover="this.style.background='#F4C542';this.style.color='#1A1A1A';this.style.transform='translateY(-2px)'"
          onmouseout="this.style.background='#FF69B4';this.style.color='#fff';this.style.transform='none'"
          onclick="gen()">↻ Try Another</button>
      </div>`;
  }
</script>
