<body>
<div class="wrap">
  <header class="app-header"><h1>Limiting Belief Identifier</h1>
  <p class="sub">A 4-question walk-through to surface the belief running the show — and replace it with one that serves you.</p></header>

  <div class="panel">
    <label for="area">What area is stuck?</label>
    <input id="area" placeholder="e.g. asking for what I am worth">
    <label for="thought">The thought you catch yourself thinking</label>
    <textarea id="thought" placeholder='e.g. "I have to prove I am useful before I can charge more"'></textarea>
    <label for="evidence">When did you first start believing this?</label>
    <input id="evidence" placeholder="An event, a person, a season of life">
    <label for="cost">What is this belief costing you?</label>
    <textarea id="cost" placeholder="In money, energy, relationships, time"></textarea>
    <button class="btn" style="margin-top:14px;width:100%;" onclick="gen()">Map the Belief</button>
  </div>

  <div id="out"></div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const F=['area','thought','evidence','cost'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('lbi_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('lbi_'+k,g(k).value)); });
  const STEP_COLORS=['#F27C38','#F4C542','#FF69B4','#A6D76A','#2E7D73'];
  const STEP_TEXT=['#fff','#1A1A1A','#fff','#1A1A1A','#fff'];
  function styledStep(badge,label,content,i){
    return `<div style="display:grid;grid-template-columns:90px 1fr;border-bottom:2px dashed rgba(0,0,0,0.07);padding:12px 0;align-items:start;">
      <div><span style="display:inline-block;background:${STEP_COLORS[i]};color:${STEP_TEXT[i]};font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;">${badge}</span></div>
      <div><div style="font-family:'Fredoka One',cursive;font-size:1rem;color:#1A1A1A;margin-bottom:4px;">${label}</div><div style="font-size:0.92rem;color:#2A2A1A;line-height:1.6;">${content}</div></div>
    </div>`;
  }
  function gen(){
    const a=esc(v('area')||'the stuck area'), th=esc(v('thought')||'the belief'), ev=esc(v('evidence')||'somewhere in your past'), co=esc(v('cost')||'real, measurable cost');
    const steps=[
      styledStep('Named','The belief running the show',`In the area of <strong>${a}</strong>, the belief is: <em>"${th}"</em>`,0),
      styledStep('Origin','Where it came from',`It started at: <strong>${ev}</strong>. That moment taught a younger version of you a survival rule. It served you then. It is not serving you now.`,1),
      styledStep('Cost','What it is costing you',`${co}. Beliefs run silently — until you make them pay rent.`,2),
      styledStep('Reframe','The belief to install instead',`Instead of <em>"${th}"</em> — try: <strong>"I am allowed to be valuable before I am perfect."</strong> Or write your own: same situation, kinder rule, true enough to repeat.`,3),
      styledStep('The work','How to replace it','Catch the old thought, breathe, say the new one out loud. Do that 50 times. The belief is not deleted by insight — it is replaced by repetition.',4),
    ];
    g('out').innerHTML=`
      <div style="padding:0;overflow:hidden;border-radius:14px;border:3px solid #A6D76A;box-shadow:0 5px 0 rgba(0,0,0,0.1);margin-bottom:16px;">
        <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:14px 20px;">
          <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.6rem;text-shadow:1px 2px 0 rgba(0,0,0,0.15);">Belief Mapped</div>
          <div style="color:rgba(255,255,255,0.88);font-size:0.9rem;margin-top:2px;">Name it. Trace it. Replace it.</div>
        </div>
        <div style="padding:8px 24px 20px;background:#FFF2E1;">
          ${steps.join('')}
          <div style="margin-top:16px;">
            <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 22px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);"
              onmouseover="this.style.background='#F4C542';this.style.color='#1A1A1A';this.style.transform='translateY(-2px)'"
              onmouseout="this.style.background='#FF69B4';this.style.color='#fff';this.style.transform='none'"
              onclick="copyOut()">Copy All</button>
          </div>
        </div>
      </div>`;
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Map it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
