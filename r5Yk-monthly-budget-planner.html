}
.btn-add, .add-btn { padding: 10px 18px; font-size: 0.95rem; }
.btn-ghost, .btn-complete, .btn-icon, .del-btn {

}
.btn-ghost:hover, .del-btn:hover { color: var(--no); background: rgba(224,112,112,0.1); transform: none; }
.btn-complete:hover { color: var(--yes); background: rgba(68,204,102,0.1); transform: none; }
.btn-checkin {

  font-weight: 400;
  font-size: 0.9rem;

  transition: background 0.15s, color 0.15s;
  box-shadow: 0 3px 0 rgba(0,0,0,0.12);
}
.btn-checkin:hover { background: var(--mustard); color: var(--dark); transform: none; }
.opt, .tab-btn, .format-btn {
  background: transparent;
  color: var(--dark);
  border: 2px solid var(--green);

.opt.sel, .opt.active, .tab-btn.active, .format-btn.active, .format-btn.sel {

}
.cc { border-radius: 14px; overflow: hidden; border: 3px solid var(--green); box-shadow: 0 5px 0 rgba(0,0,0,0.1); }

.ci-form { background: #fff8ef; border-top: 2px solid var(--green); }

.kchip.sel-no      { border-color: var(--no);     color: var(--no);     background: rgba(224,112,112,0.08); }
.pchip { background: #fff; color: var(--muted); border: 2px solid var(--green); border-radius: 7px; font-weight: 600; cursor: pointer; }
.pchip.sel { border-color: var(--pink); color: var(--pink); background: rgba(255,105,180,0.08); }
.hist-item { border-bottom: 1px solid rgba(166,215,106,0.3); color: var(--dark); }
.hist-title { color: var(--dark); font-weight: 500; }
.hist-meta { color: var(--muted); }
.empty { color: var(--muted); }
.date-label { color: rgba(255,255,255,0.5); }
.btn-done-today { color: var(--yes); font-weight: 700; font-size: 0.78rem; }
.err { color: var(--no); }
.badge, .kept-badge { border-radius: 10px; border: 1px solid; }
.entry-row, .prog-row { background: var(--panel); border-bottom: 1px solid rgba(166,215,106,0.3); color: var(--dark); }
.prog-bar-track { background: rgba(0,0,0,0.08); }
.prog-bar-fill { background: var(--mustard); }
.plan-header { text-align: center; }
.plan-goal { font-family: 'Fredoka One', cursive; font-weight: 400; font-size: 1.4rem; color: var(--mustard); }
.plan-sub { font-size: 0.85rem; color: rgba(255,255,255,0.65); }
.month-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #2A2A1A; }
.month-milestone { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1.05rem; color: #2A2A1A; }
.action-item { color: #2A2A1A; font-size: 0.88rem; font-weight: 400; }
.action-dot { color: #2A2A1A; }
.action-num { color: #2A2A1A; font-weight: 400; }
footer {
  position: static !important;
  text-align: center;
  font-size: 0.82rem;

  background: transparent;
  padding: 24px 16px 40px;
  margin-top: 32px;
}

/* Secondary button */
.btn-secondary {
  background: transparent !important;
  color: #1A1A1A !important;
  border: 2px solid #A6D76A !important;
  border-radius: 10px !important;
  font-family: 'Fredoka One', cursive !important;
  font-size: 1rem !important;
  padding: 11px 22px !important;
  cursor: pointer !important;
  transition: background 0.18s, color 0.18s, transform 0.15s !important;
  box-shadow: none !important;
}

  background: #A6D76A !important;

<body>
<div class="wrap">
  <header class="app-header"><h1>Monthly Budget Planner</h1>
  <p class="sub">Plan every dollar before the month starts. What gets a job stays.</p></header>

  <div style="padding:0;overflow:hidden;border-radius:14px;border:3px solid #A6D76A;box-shadow:0 5px 0 rgba(0,0,0,0.1);margin-bottom:14px;">
    <div style="background:#A6D76A;border-radius:11px 11px 0 0;padding:12px 20px;">
      <div style="font-family:'Fredoka One',cursive;color:#1A1A1A;font-size:1.4rem;">Income</div>
    </div>
    <div style="padding:16px 20px;background:#FFF2E1;">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
        <div style="flex:2;min-width:120px;"><label style="font-size:0.85rem;font-weight:700;color:#1A1A1A;margin-bottom:5px;display:block;">Source</label><input id="iN" placeholder="e.g. Salary, Freelance, Side hustle" style="width:100%;padding:9px 11px;"></div>
        <div style="min-width:100px;"><label style="font-size:0.85rem;font-weight:700;color:#1A1A1A;margin-bottom:5px;display:block;">Amount ($)</label><input id="iA" type="number" min="0" style="width:100%;padding:9px 11px;"></div>
        <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 18px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);white-space:nowrap;" onclick="add('i')">+ Add</button>
      </div>
      <div id="iL" style="font-size:0.93rem;color:#7A7A6A;">No income added yet.</div>
    </div>
  </div>

  <div style="padding:0;overflow:hidden;border-radius:14px;border:3px solid #A6D76A;box-shadow:0 5px 0 rgba(0,0,0,0.1);margin-bottom:14px;">
    <div style="background:#FF69B4;border-radius:11px 11px 0 0;padding:12px 20px;">
      <div style="font-family:'Fredoka One',cursive;color:#fff;font-size:1.4rem;">Expenses</div>
    </div>
    <div style="padding:16px 20px;background:#FFF2E1;">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
        <div style="flex:2;min-width:120px;"><label style="font-size:0.85rem;font-weight:700;color:#1A1A1A;margin-bottom:5px;display:block;">Category</label><input id="eN" placeholder="e.g. Rent, Groceries, Subscriptions" style="width:100%;padding:9px 11px;"></div>
        <div style="min-width:100px;"><label style="font-size:0.85rem;font-weight:700;color:#1A1A1A;margin-bottom:5px;display:block;">Amount ($)</label><input id="eA" type="number" min="0" style="width:100%;padding:9px 11px;"></div>
        <button style="background:#FF69B4;color:#fff;border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 18px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.15);white-space:nowrap;" onclick="add('e')">+ Add</button>
      </div>
      <div id="eL" style="font-size:0.93rem;color:#7A7A6A;">No expenses added yet.</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat" style="padding:0;overflow:hidden;">
      <div style="background:#A6D76A;border-radius:11px 11px 0 0;padding:8px 14px;text-align:center;">
        <span style="font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1A1A1A;">INCOME</span>
      </div>
      <div style="padding:12px;text-align:center;background:#FFF2E1;">
        <div class="v stat-n" id="sI" style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#2E7D73;">$0</div>
      </div>
    </div>
    <div class="stat" style="padding:0;overflow:hidden;">
      <div style="background:#FF69B4;border-radius:11px 11px 0 0;padding:8px 14px;text-align:center;">
        <span style="font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;">EXPENSES</span>
      </div>
      <div style="padding:12px;text-align:center;background:#FFF2E1;">
        <div class="v stat-n" id="sE" style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#e07070;">$0</div>
      </div>
    </div>
    <div class="stat" style="padding:0;overflow:hidden;">
      <div style="background:#F27C38;border-radius:11px 11px 0 0;padding:8px 14px;text-align:center;">
        <span style="font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;">LEFT TO ALLOCATE</span>
      </div>
      <div style="padding:12px;text-align:center;background:#FFF2E1;">
        <div class="v stat-n" id="sL" style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#F4C542;">$0</div>
      </div>
    </div>
  </div>
  <div style="margin-top:16px;">
    <button style="background:transparent;color:#1A1A1A;border:2px solid #A6D76A;border-radius:10px;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 22px;cursor:pointer;" onclick="clearAll()">Clear All</button>
  </div>
  <footer><div style="font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:3px;">Perfectly Apped · A Cha-Cha-Tchotchkes Collection</div><div style="font-size:0.75rem;color:rgba(255,255,255,0.45);">Original app credit: GetPaidToBeYouOnline</div></footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let I=JSON.parse(localStorage.getItem('mbp_i')||'[]'), E=JSON.parse(localStorage.getItem('mbp_e')||'[]');
  const save=()=>{ localStorage.setItem('mbp_i',JSON.stringify(I)); localStorage.setItem('mbp_e',JSON.stringify(E)); };
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(k){ const n=k==='i'?v('iN'):v('eN'), a=parseFloat((k==='i'?g('iA').value:g('eA').value))||0; if(!n||!a){alert('Add a name and amount.');return;}
    (k==='i'?I:E).push({n,a}); (k==='i'?'iN iA':'eN eA').split(' ').forEach(x=>g(x).value=''); save(); render(); }
  function del(k,i){ (k==='i'?I:E).splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ I=[]; E=[]; save(); render(); } }
  function render(){
    const ti=I.reduce((s,x)=>s+x.a,0), te=E.reduce((s,x)=>s+x.a,0);
    g('sI').textContent='$'+Math.round(ti).toLocaleString();
    g('sE').textContent='$'+Math.round(te).toLocaleString();
    const lo=ti-te;
    g('sL').textContent=(lo<0?'-$':'$')+Math.abs(Math.round(lo)).toLocaleString();
    g('sL').style.color=lo<0?'#e07070':'#A6D76A';
    g('iL').innerHTML = I.length
      ? I.map((x,i)=>{
          const rowBg=i%2===0?'#ffffff':'#fffaf3';
          return `<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;background:${rowBg};border-bottom:2px dashed rgba(0,0,0,0.07);border-radius:6px;margin-bottom:2px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="display:inline-block;background:#A6D76A;color:#1A1A1A;font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;">IN</span>
              <span style="color:#2A2A1A;font-size:0.93rem;">${esc(x.n)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-family:'Fredoka One',cursive;color:#2E7D73;font-size:1rem;">$${x.a.toLocaleString()}</span>
              <button style="background:none;border:none;color:#7A7A6A;cursor:pointer;font-size:0.85rem;padding:4px 6px;border-radius:6px;" onclick="del('i',${i})">✕</button>
            </div>
          </div>`;
        }).join('')
      : '<div style="color:#7A7A6A;padding:10px 0;">No income added yet.</div>';
    g('eL').innerHTML = E.length
      ? E.map((x,i)=>{
          const rowBg=i%2===0?'#ffffff':'#fffaf3';
          return `<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;background:${rowBg};border-bottom:2px dashed rgba(0,0,0,0.07);border-radius:6px;margin-bottom:2px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="display:inline-block;background:#FF69B4;color:#fff;font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;">OUT</span>
              <span style="color:#2A2A1A;font-size:0.93rem;">${esc(x.n)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-family:'Fredoka One',cursive;color:#e07070;font-size:1rem;">$${x.a.toLocaleString()}</span>
              <button style="background:none;border:none;color:#7A7A6A;cursor:pointer;font-size:0.85rem;padding:4px 6px;border-radius:6px;" onclick="del('e',${i})">✕</button>
            </div>
          </div>`;
        }).join('')
      : '<div style="color:#7A7A6A;padding:10px 0;">No expenses added yet.</div>';
  }
  render();
</script>
</body>
</html>
